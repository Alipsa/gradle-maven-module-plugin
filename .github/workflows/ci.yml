name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and unit test
        run: ./gradlew build -x functionalTest

  functional-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        gradle-version: ['8.14.4', '9.4.0']
    name: Functional tests (Gradle ${{ matrix.gradle-version }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.9

      - uses: gradle/actions/setup-gradle@v4

      - name: Functional tests with Gradle ${{ matrix.gradle-version }}
        env:
          TEST_GRADLE_VERSION: ${{ matrix.gradle-version }}
        run: ./gradlew functionalTest -DtestGradleVersion="$TEST_GRADLE_VERSION"
